<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Five Agency</title>
    <script src="https://code.iconify.design/iconify-icon/1.0.8/iconify-icon.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              geist: ['Inter', 'system-ui', 'sans-serif'],
            },
            keyframes: {
              fadeSlideIn: {
                '0%': { opacity: '0', transform: 'translateY(24px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideInBlur: {
                '0%': { opacity: '0', transform: 'translateY(8px)', filter: 'blur(8px)' },
                '100%': { opacity: '1', transform: 'translateY(0)', filter: 'blur(0px)' },
              },
            },
            animation: {
              fadeSlideIn: 'fadeSlideIn 1s ease-out forwards',
              slideInBlur: 'slideInBlur 0.8s ease-out 1.2s forwards',
            },
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #000; color: #fff; font-family: 'Inter', system-ui, sans-serif; }
      .animate-on-scroll { opacity: 0; transform: translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; }
      .animate-on-scroll.animate { opacity: 1; transform: translateY(0); }
      @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slideInBlur { from { opacity: 0; transform: translateY(8px); filter: blur(8px); } to { opacity: 1; transform: translateY(0); filter: blur(0px); } }
      input, select, textarea { color: #fff; }
      input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.2); }
      select option { background: #000; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
